{% extends "base.html" %}
{% block content %}
<h1>Log in</h1>
<p class="muted">Identity = your AD email from <code>config/settings.yaml</code>. On-prem app — no password; access is controlled at the network / VM level.</p>
<form method="post">
  <select name="email">
    {% for u in all_users %}<option value="{{ u }}">{{ u }}</option>{% endfor %}
  </select>
  <button type="submit">Enter</button>
</form>
{% endblock %}
